<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420" viewBox="0 0 300 420" role="img">
  <title>Task-Hub icon</title>
  <desc>Task-Hub app icon with TH monogram on a violet-indigo gradient square and stylish wordmark</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <clipPath id="cl">
      <rect width="300" height="300" rx="64"/>
    </clipPath>
  </defs>

  <!-- Icon square -->
  <rect width="300" height="300" rx="64" fill="url(#bg)"/>
  <rect width="300" height="300" rx="64" fill="url(#shine)" clip-path="url(#cl)"/>

  <!-- Decorative rings -->
  <circle cx="150" cy="150" r="90" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <circle cx="150" cy="150" r="68" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12" stroke-width="0.8"/>

  <!-- T: crossbar -->
  <rect x="80" y="100" width="60" height="9" rx="4" fill="#ffffff"/>
  <!-- T: stem -->
  <rect x="95" y="100" width="9" height="80" rx="4" fill="#ffffff"/>

  <!-- H: left stem -->
  <rect x="157" y="100" width="9" height="80" rx="4" fill="url(#accent)"/>
  <!-- H: right stem -->
  <rect x="193" y="100" width="9" height="80" rx="4" fill="url(#accent)"/>
  <!-- H: crossbar -->
  <rect x="157" y="135" width="45" height="9" rx="4" fill="url(#accent)"/>

  <!-- Checkmark badge -->
  <circle cx="222" cy="248" r="22" fill="#4338CA"/>
  <circle cx="222" cy="248" r="22" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" fill="none"/>
  <path d="M212 248 L219 255 L233 240" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="46" y="360" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="700" fill="#3C3489" letter-spacing="-0.5">task</text>
  <text x="154" y="360" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="700" fill="#7C3AED" letter-spacing="-0.5">-hub</text>

  <!-- Underline -->
  <rect x="46" y="370" width="208" height="2" rx="1" fill="#7C3AED" fill-opacity="0.2"/>

  <!-- Tagline -->
  <text x="150" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#534AB7" letter-spacing="2.5">MANAGE · FOCUS · SHIP</text>
</svg>
